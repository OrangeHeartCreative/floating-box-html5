<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Floating Box</title>
  <link rel="stylesheet" href="style.css">
 </head>
<body>
  <div id="gameWrap" class="game-wrap">
    <div id="titleScreen" class="title-screen">
      <h1>BrickBreaker</h1>
      <button id="startGame" type="button" autofocus>Start Game</button>
      <div class="controls-hint">Press Space to thrust · ← / → or A / D to move · P to pause</div>
    </div>
    <canvas id="game" style="display:none" tabindex="0"></canvas>
  </div>
  <div class="hint">Press Space to thrust. Use ←/→ or A/D to move. Press P to pause.</div>
  <div class="score" id="score">Score: 0</div>
  <div class="airtime" id="airtime">Air: 0.00s (best: 0.00s)</div>
  <div id="gameOver" class="overlay" aria-hidden="true">
    <div class="panel">
      <h1>Game Over</h1>
      <div class="final-air">Your airtime: <span id="final-air">0.00s</span></div>
      <label for="initials">Enter initials (3):</label>
      <input id="initials" maxlength="3" placeholder="ABC" />
      <div class="buttons">
        <button id="submitScore">Submit</button>
        <button id="restart">Restart</button>
      </div>
      <div id="saveMsg" class="save-msg" aria-live="polite"></div>
      <div class="leaderboard" id="leaderboard">
        <div class="leaderboard-header">
          <h2>Leaderboard</h2>
          <div class="leaderboard-controls">
            <button id="clearLeaderboard" class="clear-btn">Clear</button>
          </div>
        </div>
        <ol id="scoresList"></ol>
        <div id="leaderboardEmpty" class="leaderboard-empty">No scores yet</div>
      </div>
      <div id="confirmModal" class="confirm-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="confirm-panel">
          <p id="confirmText">Are you sure?</p>
          <div class="confirm-buttons">
            <button id="confirmYes" class="confirm-yes">Yes</button>
            <button id="confirmNo" class="confirm-no">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
