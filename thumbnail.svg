<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#07101a"/>
    </linearGradient>
    <linearGradient id="b" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffd54d"/>
      <stop offset="0.6" stop-color="#ff8b38"/>
      <stop offset="1" stop-color="#ff3b3b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <g filter="url(#glow)">
    <rect x="96" y="160" width="320" height="200" rx="20" fill="url(#b)" />
  </g>
  <text x="256" y="120" font-family="Inter, system-ui, Arial" font-size="34" fill="#c7d2fe" text-anchor="middle">Floating Box</text>
  <text x="256" y="420" font-family="Inter, system-ui, Arial" font-size="14" fill="#9ca3ff" text-anchor="middle">Space to thrust · ←/→ or A/D to move</text>
</svg>